name: ARM64 Build & Rolling Release

on:
  push:
    branches:
      - main # 仅在代码合并入主分支时触发

permissions:
  contents: write # 确保 actions 可以读写 releases 和 tags

jobs:
  build-and-release:
    name: Build ROS2 workspace for ARM64 & Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Register QEMU for ARM64 emulation
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run Workspace Cross-Compilation
        run: |
          chmod +x scripts/build_arm64.sh
          ./scripts/build_arm64.sh

      - name: Archive ARM64 Install Space
        run: |
          # 将编译生成的 install_arm64 产物文件夹打包
          tar -czf install_arm64.tar.gz install_arm64/

      - name: Create Rolling Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 尝试删除现有的 latest 标签和 Release
          gh release delete latest -y || true
          git tag -d latest || true
          
          # 2. 重新发布包到名为 latest 的 Release 页面
          gh release create latest install_arm64.tar.gz \
            --title "最新实机构建 (Rolling Release)" \
            --notes "由 GitHub Actions 云端交叉编译自动生成。编译时间：$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') (北京时间)" \
            --target main
